name: Clabotch
options:
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: com.clabotch
settings:
  base:
    INFOPLIST_KEY_LSUIElement: YES
targets:
  Clabotch:
    type: application
    platform: macOS
    sources:
      - Clabotch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clabotch.app
        PRODUCT_NAME: Clabotch
        INFOPLIST_KEY_LSUIElement: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CODE_SIGN_ENTITLEMENTS: Clabotch/Clabotch.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: ""
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
  ClabotchTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - ClabotchTests
    dependencies:
      - target: Clabotch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clabotch.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
